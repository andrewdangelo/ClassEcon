# Hot-reload the landing site without rebuilding the production image.
#
# Prerequisites:
#   - Stop the static landing container so port 5174 is free:
#       docker compose stop landing-page
#   - Backend GraphQL reachable from your browser at the URL below (e.g. stack running on host).
#
# Run:
#   docker compose -f docker-compose.landing-dev.yml up
#
# Open: http://localhost:5174
#
# Vite reads VITE_* when the dev server starts; code edits reload instantly. Restart the
# container if you change env vars.

services:
  landing-page-dev:
    image: node:18-alpine
    container_name: classecon-landing-dev
    working_dir: /app
    ports:
      - "5174:5174"
    environment:
      VITE_GRAPHQL_URL: http://localhost:4000/graphql
      VITE_FRONTEND_URL: http://localhost:5173
      VITE_NODE_ENV: development
    volumes:
      - ./LandingPage:/app
      - landing_page_dev_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - |
        set -e
        corepack enable && corepack prepare pnpm@latest --activate
        pnpm install
        pnpm dev

volumes:
  landing_page_dev_node_modules:
