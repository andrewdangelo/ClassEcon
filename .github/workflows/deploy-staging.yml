name: Deploy — Staging

# Merges to `staging` ship the QA environment that lives on
# *-staging.classecon-prod.workers.dev and points at the ce-staging-01 Atlas
# cluster.

on:
  push:
    branches: [staging]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
