name: Deploy — Production

# Merges to `main` ship the site that lives on classecon.net.

on:
  push:
    branches: [main]
    # Skip when only non-code files change.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
