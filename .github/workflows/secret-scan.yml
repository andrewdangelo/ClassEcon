name: Secret pattern scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan tracked files for obvious secret patterns
        run: node scripts/scan-secret-patterns.mjs
