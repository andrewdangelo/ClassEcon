name: Push secrets to Cloudflare

# Manual-only: rotate the Cloudflare Worker secrets for either prod or
# staging. Cloudflare persists the last-pushed values, so this only needs
# to run when something in the secret bundle actually changes (rotation,
# new key, etc.). Regular code deploys do NOT call this workflow.
#
# How it works:
#   - Two GitHub Actions secrets hold the full contents of each
#     `cloudflare/.secrets.local` file:
#         SECRETS_LOCAL_PROD
#         SECRETS_LOCAL_STAGING
#   - The workflow writes the chosen bundle to `cloudflare/.secrets.local`
#     and runs `push-secrets.sh` (optionally `--env staging`).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to push to"
        required: true
        type: choice
        options: [prod, staging]
      service:
        description: "Specific service (or 'all')"
        required: false
        default: "all"
        type: choice
        options: [all, auth, backend, payment, email, email-worker]

jobs:
  push:
    name: Push secrets (${{ inputs.environment }} / ${{ inputs.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: push-secrets-${{ inputs.environment }}
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Write .secrets.local from GitHub Secrets
        working-directory: cloudflare
        env:
          BUNDLE_PROD: ${{ secrets.SECRETS_LOCAL_PROD }}
          BUNDLE_STAGING: ${{ secrets.SECRETS_LOCAL_STAGING }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          if [[ "$ENV_NAME" == "staging" ]]; then
            bundle="$BUNDLE_STAGING"
          else
            bundle="$BUNDLE_PROD"
          fi
          if [[ -z "$bundle" ]]; then
            echo "::error::GitHub secret for $ENV_NAME is empty. Set SECRETS_LOCAL_PROD / SECRETS_LOCAL_STAGING first."
            exit 1
          fi
          printf '%s\n' "$bundle" > .secrets.local
          chmod 600 .secrets.local

      - name: Push secrets
        working-directory: cloudflare
        run: |
          if [[ "${{ inputs.environment }}" == "staging" ]]; then
            ./push-secrets.sh --env staging "${{ inputs.service }}"
          else
            ./push-secrets.sh "${{ inputs.service }}"
          fi

      - name: Wipe .secrets.local from runner
        if: always()
        working-directory: cloudflare
        run: rm -f .secrets.local
