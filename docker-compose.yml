services:
  mongodb:
    image: mongo:7
    container_name: classecon-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: classecon
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - classecon-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/classecon --quiet || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-docker-dev-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_JWT_SECRET: ${REFRESH_JWT_SECRET:-docker-dev-refresh-secret}
      REFRESH_JWT_EXPIRES_IN: ${REFRESH_JWT_EXPIRES_IN:-7d}
      SERVICE_API_KEY: ${SERVICE_API_KEY:-dev-internal-key}
    restart: unless-stopped
    networks:
      - classecon-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000
      FRONTEND_URL: http://localhost:5173
      LANDING_PAGE_URL: http://localhost:5174
      AUTH_SERVICE_URL: http://auth-service:4001
      SERVICE_API_KEY: ${SERVICE_API_KEY:-dev-internal-key}
      DATABASE_URL: mongodb://mongodb:27017/classecon
      PAYMENT_SERVICE_URL: http://payment-service:4003
      PAYMENT_SERVICE_API_KEY: ${PAYMENT_SERVICE_API_KEY:-dev-internal-key}
    depends_on:
      auth-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - classecon-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ./PaymentService
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    environment:
      PORT: "4003"
      NODE_ENV: production
      BILLING_MODE: ${BILLING_MODE:-stripe}
      DATABASE_URL: mongodb://mongodb:27017/classecon-payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder_key}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder_secret}
      STRIPE_PRICE_STARTER_MONTHLY: ${STRIPE_PRICE_STARTER_MONTHLY:-price_starter_monthly}
      STRIPE_PRICE_STARTER_YEARLY: ${STRIPE_PRICE_STARTER_YEARLY:-price_starter_yearly}
      STRIPE_PRICE_PROFESSIONAL_MONTHLY: ${STRIPE_PRICE_PROFESSIONAL_MONTHLY:-price_professional_monthly}
      STRIPE_PRICE_PROFESSIONAL_YEARLY: ${STRIPE_PRICE_PROFESSIONAL_YEARLY:-price_professional_yearly}
      STRIPE_PRICE_SCHOOL_MONTHLY: ${STRIPE_PRICE_SCHOOL_MONTHLY:-price_school_monthly}
      STRIPE_PRICE_SCHOOL_YEARLY: ${STRIPE_PRICE_SCHOOL_YEARLY:-price_school_yearly}
      STRIPE_COUPON_FOUNDING: ${STRIPE_COUPON_FOUNDING:-FOUNDING50}
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://backend:4000
      BACKEND_API_KEY: ${PAYMENT_SERVICE_API_KEY:-dev-internal-key}
      SERVICE_API_KEY: ${PAYMENT_SERVICE_API_KEY:-dev-internal-key}
      JWT_SECRET: ${JWT_SECRET:-docker-dev-jwt-secret}
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - classecon-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_GRAPHQL_URL: http://localhost:4000/graphql
        VITE_GRAPHQL_HTTP_URL: http://localhost:4000/graphql
        VITE_GRAPHQL_WS_URL: ws://localhost:4000/graphql
        VITE_LANDING_PAGE_URL: http://localhost:5174
        VITE_AUTH_SERVICE_URL: http://localhost:4001
        VITE_NODE_ENV: production
        VITE_E2E_BETA_BYPASS: ${VITE_E2E_BETA_BYPASS:-false}
    ports:
      - "5173:80"
    environment:
      PORT: "80"
      VITE_GRAPHQL_URL: http://localhost:4000/graphql
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - classecon-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  landing-page:
    build:
      context: ./LandingPage
      dockerfile: Dockerfile
      args:
        VITE_GRAPHQL_URL: http://localhost:4000/graphql
        VITE_FRONTEND_URL: http://localhost:5173
        VITE_NODE_ENV: production
    ports:
      - "5174:80"
    environment:
      PORT: "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - classecon-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_GRAPHQL_URL: http://localhost:4000/graphql
    ports:
      - "5175:80"
    depends_on:
      backend:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - classecon-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  email-service:
    build:
      context: ./EmailService
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    environment:
      PORT: "4004"
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: email_service
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder_key}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@classecon.local}
      APP_URL: http://localhost:5173
      ADMIN_TOKEN: ${EMAIL_ADMIN_TOKEN:-docker-dev-admin-token-32-chars-min}
      SERVICE_TOKEN: ${EMAIL_SERVICE_TOKEN:-docker-dev-service-token-32-chars}
      WEBHOOK_SECRET: ${EMAIL_WEBHOOK_SECRET:-docker-webhook-sec}
      UNSUBSCRIBE_HMAC_SECRET: ${UNSUBSCRIBE_HMAC_SECRET:-docker-dev-unsubscribe-token-32ch}
      ALLOWED_REDIRECT_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - classecon-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4004/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

networks:
  classecon-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
